<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FashionAI Login</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

</head>


<body>


<main class="loginPage">

<section class="card loginCard">


<h1>
FashionAI ✨
</h1>


<p>
Your personal AI fashion stylist
</p>



<img
src="./assets/logo.png"
class="logo"
alt="FashionAI Logo">



<input 
type="email"
id="email"
placeholder="Enter email"
required>



<input 
type="password"
id="password"
placeholder="Enter password"
required>



<button 
id="signupBtn"
class="login-btn">

Create Account

</button>



<button 
id="loginBtn"
class="login-btn">

Login

</button>



<p id="loginStatus"></p>


</section>

</main>





<!-- Login System -->

<script type="module">

import { 
setupEmailAuth 
} from "./js/auth-manager.js";


setupEmailAuth();


</script>



</body>

</html>
