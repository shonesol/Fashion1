<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
FashionAI Login
</title>


<link rel="stylesheet" href="style.css">


<link rel="manifest" href="manifest.json">


</head>



<body>



<main class="loginPage">


<section class="card loginCard">


<h1>
FashionAI ✨
</h1>


<p>
Your personal AI fashion stylist
</p>



<img

src="./assets/logo.png"

class="logo"

alt="FashionAI Logo">





<button 
id="googleLogin"
class="google-btn">

🔵 Continue with Google

</button>




<p id="loginStatus">

</p>



</section>


</main>





<!-- Protect page -->

<script type="module">

import {

protectPage

}

from "./js/auth-guard.js";



protectPage();


</script>





<!-- Login -->

<script type="module">

import {

setupLoginButton

}

from "./js/auth-manager.js";



const loginButton =
document.getElementById(
"googleLogin"
);



if(loginButton){


setupLoginButton();



}


</script>




</body>

</html>
