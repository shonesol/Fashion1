<!DOCTYPE html>
<html>

<head>

<title>
FashionAI Login
</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<div class="card login-card">


<h1>
🤖 FashionAI
</h1>


<p class="subtitle">
Your Personal AI Fashion Stylist
</p>


<h2>
Welcome Back
</h2>




<div class="input-box">


<input 
type="email"
id="email"
placeholder="📧 Enter your email"
>


</div>





<div class="input-box">


<input 
type="password"
id="password"
placeholder="🔒 Enter your password"
>


</div>






<button id="loginBtn">

✨ Login

</button>




<button id="signupBtn">

🌟 Create Account

</button>




<p id="message"></p>



</div>


</div>





<script 
type="module"
src="login.js">
</script>


</body>

</html>
