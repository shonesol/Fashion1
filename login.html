<!DOCTYPE html>
<html lang="en">

<head>
<style>
/* =====================================
 FashionAI Authentication UI
 Login + Signup
===================================== */


*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,sans-serif;
}


body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:
linear-gradient(
135deg,
#071426,
#123b5d,
#D4AF37
);

}



.loginPage{

width:100%;

padding:20px;

}



.loginCard{


max-width:420px;

margin:auto;

padding:35px 30px;

background:white;

border-radius:25px;

text-align:center;

box-shadow:
0 20px 50px rgba(0,0,0,.3);

}



.loginCard h1{


font-size:38px;

color:#D4AF37;

margin-bottom:10px;

}



.loginCard p{

color:#555;

margin-bottom:20px;

}



.logo{


width:100px;

height:100px;

object-fit:contain;

border-radius:50%;

margin-bottom:20px;

}




input{


width:100%;

padding:15px;

margin:10px 0;

border-radius:12px;

border:1px solid #ddd;

font-size:16px;

outline:none;

}



input:focus{

border-color:#D4AF37;

}




.login-btn{


width:100%;

padding:15px;

margin-top:15px;

border:none;

border-radius:30px;

cursor:pointer;

font-size:17px;

font-weight:bold;

background:

linear-gradient(
90deg,
#D4AF37,
#f5d76e
);


color:#071426;

transition:.3s;

}



.login-btn:hover{

transform:translateY(-3px);

}



#loginStatus{

margin-top:20px;

font-weight:bold;

color:#123b5d;

}



/* Mobile */

@media(max-width:480px){


.loginCard{

padding:25px 20px;

}


.loginCard h1{

font-size:32px;

}


}
</style>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FashionAI Login</title>

<link rel="manifest" href="manifest.json">

</head>


<body>


<main class="loginPage">

<section class="card loginCard">


<h1>
FashionAI ✨
</h1>


<p>
Your personal AI fashion stylist
</p>



<img
src="./assets/logo.png"
class="logo"
alt="FashionAI Logo">



<input 
type="email"
id="email"
placeholder="Enter email"
required>



<input 
type="password"
id="password"
placeholder="Enter password"
required>



<button 
id="signupBtn"
class="login-btn">

Create Account

</button>



<button 
id="loginBtn"
class="login-btn">

Login

</button>



<p id="loginStatus"></p>


</section>

</main>





<!-- Login System -->

<script type="module">

import { 
setupEmailAuth 
} from "./js/auth-manager.js";


setupEmailAuth();


</script>



</body>

</html>
