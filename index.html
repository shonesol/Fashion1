<!DOCTYPE html>
<html>

<head>

<title>FashionAI Assistant</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<!-- ACCOUNT -->

<div class="card">

<h3>👤 My Account</h3>

<p id="userEmail">
Loading user...
</p>

<button id="logoutBtn">
🚪 Logout
</button>

</div>



<!-- HEADER -->

<div class="card">

<h1>
🤖 FashionAI
</h1>

<p>
Your personal AI fashion stylist
</p>

</div>




<!-- CLOTHING UPLOAD -->

<div class="card">

<h2>
📸 Add Clothing
</h2>


<input
type="file"
id="clothingImage"
accept="image/*"
>


<button id="uploadBtn">

✨ Analyze Clothing

</button>


<div id="result"></div>


</div>






<!-- OUTFIT GENERATOR -->

<div class="card">

<h2>
👗 AI Outfit Generator
</h2>


<button id="outfitBtn">

✨ Create My Outfit

</button>


<div id="outfitResult"></div>


</div>






<!-- SMART ADVICE -->

<div class="card">

<h2>
🌤️ Smart Outfit Advice
</h2>



<select id="occasion">

<option value="casual">
Casual
</option>

<option value="work">
Work
</option>

<option value="party">
Party
</option>

<option value="travel">
Travel
</option>

</select>




<select id="weather">

<option value="hot">
Hot
</option>

<option value="cold">
Cold
</option>

<option value="normal">
Normal
</option>

</select>



<button id="smartOutfitBtn">

🌟 Recommend Outfit

</button>



<div id="smartOutfitResult"></div>


</div>








<!-- WARDROBE -->

<div class="card">

<h2>
👕 My Wardrobe
</h2>



<input

type="search"

id="searchClothes"

placeholder="Search clothes..."

>




<select id="categoryFilter">


<option value="All">
All
</option>


<option value="Top">
Top
</option>


<option value="Bottom">
Bottom
</option>


<option value="Shoes">
Shoes
</option>


<option value="Dress">
Dress
</option>


<option value="Jacket">
Jacket
</option>


<option value="Accessories">
Accessories
</option>


</select>




<div id="wardrobe"></div>


</div>







<!-- WARDROBE AI -->

<div class="card">

<h2>
🧠 Wardrobe AI Analysis
</h2>


<button id="analyzeWardrobeBtn">

🔍 Check Wardrobe

</button>


<div id="wardrobeAdvice"></div>


</div>



</div>





<!-- SCRIPTS -->

<script type="module" src="./firebase.js"></script>

<script type="module" src="./app.js"></script>

<script type="module" src="./upload.js"></script>

<script type="module" src="./wardrobe.js"></script>

<script type="module" src="./profile.js"></script>


</body>

</html>
