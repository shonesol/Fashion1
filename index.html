<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
FashionAI Assistant
</title>


<link rel="stylesheet" href="style.css">


</head>


<body>


<div class="container">



<!-- ACCOUNT -->

<div class="card">

<h3>
👤 My Account
</h3>


<p id="userEmail">
Loading user...
</p>


<button id="logoutBtn">
🚪 Logout
</button>


</div>





<!-- HEADER -->

<div class="card">


<h1>
🤖 FashionAI
</h1>


<p>
Your personal AI fashion stylist
</p>


</div>








<!-- CLOTHING UPLOAD -->

<div class="card">


<h2>
📸 Add Clothing
</h2>



<input
type="file"
id="clothingImage"
accept="image/*"
>



<button id="uploadBtn">

✨ Analyze Clothing

</button>




<div id="result">

</div>


</div>









<!-- OUTFIT GENERATOR -->

<div class="card">


<h2>
👗 AI Outfit Generator
</h2>



<button id="outfitBtn">

✨ Create My Outfit

</button>




<div id="outfitResult">

</div>



</div>









<!-- VOICE ASSISTANT -->

<div class="card voice-box">


<h2>
🎙️ Talk With FashionAI
</h2>


<p>
Ask about outfits, clothes, colors and style.
</p>



<button id="voiceBtn">

🎙️ Talk to FashionAI

</button>




<h3>
You said:
</h3>


<div id="userText">

</div>





<h3>
FashionAI:
</h3>


<div id="voiceAnswer">

</div>


</div>









<!-- SMART OUTFIT -->

<div class="card">


<h2>
🌤️ Smart Outfit Advice
</h2>




<select id="occasion">

<option value="Casual">
Casual
</option>


<option value="Work">
Work
</option>


<option value="Party">
Party
</option>


<option value="Travel">
Travel
</option>


</select>







<select id="weather">


<option value="Hot">
Hot
</option>


<option value="Cold">
Cold
</option>


<option value="Normal">
Normal
</option>


</select>







<button id="smartOutfitBtn">

🌟 Recommend Outfit

</button>





<div id="smartOutfitResult">

</div>



</div>









<!-- WARDROBE AI -->

<div class="card">


<h2>
🧠 Analyze My Wardrobe
</h2>



<button id="analyzeWardrobeBtn">

🔍 Check Wardrobe

</button>




<div id="wardrobeAdvice">

</div>



</div>









<!-- WARDROBE DISPLAY -->

<div class="card">


<h2>
👕 My Wardrobe
</h2>





<input

type="search"

id="searchClothes"

placeholder="Search clothes..."

>







<select id="categoryFilter">


<option value="All">
All
</option>


<option value="Top">
Top
</option>


<option value="Bottom">
Bottom
</option>


<option value="Shoes">
Shoes
</option>


<option value="Dress">
Dress
</option>


<option value="Jacket">
Jacket
</option>


<option value="Accessories">
Accessories
</option>



</select>






<div id="wardrobe">

</div>



</div>









<!-- STATISTICS -->

<div class="card">


<h2>
📊 Wardrobe Statistics
</h2>


<div id="wardrobeStats">

</div>


</div>







</div>








<!-- MAIN CONTROLLERS -->

<script type="module" src="app.js"></script>

<script type="module" src="upload.js"></script>

<script type="module" src="wardrobe.js"></script>

<script type="module" src="profile.js"></script>



</body>


</html>
